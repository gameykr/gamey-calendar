<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gamey Calendar · 위젯 미리보기</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Noto Sans KR", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
    background:
      radial-gradient(ellipse at 20% 10%, rgba(255,46,108,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(0,229,255,0.12) 0%, transparent 50%),
      linear-gradient(180deg, #06060f 0%, #0a0614 100%);
    min-height: 100vh;
    padding: 60px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: #e6eaf5;
  }
  /* 배경 그리드 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
    -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
  }
  .label {
    position: relative;
    z-index: 1;
    display: inline-block;
    font-size: 10px;
    font-weight: 900;
    letter-spacing: 0.3em;
    color: #0a0a1a;
    background: linear-gradient(135deg, #ff2e6c, #00e5ff);
    padding: 5px 14px;
    border-radius: 2px;
    margin-bottom: 16px;
    box-shadow: 0 0 20px rgba(255,46,108,0.4), 0 0 40px rgba(0,229,255,0.2);
  }
  h1 {
    position: relative;
    z-index: 1;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 0.04em;
    text-align: center;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #fff, #ff2e6c 50%, #00e5ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-transform: uppercase;
  }
  .subtitle {
    position: relative;
    z-index: 1;
    font-size: 13px;
    color: #6b7280;
    margin-bottom: 44px;
    text-align: center;
    line-height: 1.7;
    max-width: 520px;
    letter-spacing: 0.02em;
  }
  .size-wrap {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    width: 100%;
    max-width: 520px;
  }
  .size-wrap.mobile {
    max-width: 340px;
    margin-top: 44px;
  }
  .size-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    font-weight: 800;
    color: #9ca3b8;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 5px 12px;
    border-radius: 12px;
    margin-bottom: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .size-badge::before {
    content: '';
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #39ff9a;
    box-shadow: 0 0 6px #39ff9a;
  }
  .widget-container {
    width: 100%;
  }
  .footnote {
    position: relative;
    z-index: 1;
    margin-top: 60px;
    font-size: 11px;
    color: #4b5264;
    text-align: center;
    max-width: 520px;
    line-height: 1.8;
    letter-spacing: 0.05em;
  }
  .footnote a {
    color: #00e5ff;
    text-decoration: none;
    font-weight: 700;
  }
  .footnote a:hover {
    text-shadow: 0 0 8px rgba(0,229,255,0.6);
  }
  .divider {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #ff2e6c, transparent);
    margin: 18px auto;
  }
  @media (max-width: 640px) {
    body { padding: 40px 16px; }
    h1 { font-size: 18px; }
    .subtitle { font-size: 12px; margin-bottom: 32px; }
  }
</style>
</head>
<body>

<span class="label">WIDGET PREVIEW</span>
<h1>Gamey Calendar</h1>
<p class="subtitle">gamey.kr 메인 "많이 본 뉴스" 위 슬롯에 삽입되는 위젯입니다.<br>실제 운영 시 보이는 모습 그대로입니다.</p>

<div class="size-wrap">
  <span class="size-badge">PC · 520px</span>
  <div class="widget-container">
    <div id="gamey-calendar-embed-pc"></div>
  </div>
</div>

<div class="size-wrap mobile">
  <span class="size-badge">Mobile · 340px</span>
  <div class="widget-container">
    <div id="gamey-calendar-embed-mobile"></div>
  </div>
</div>

<div class="footnote">
  카드 클릭 시 <a href="https://calendar.gamey.kr" target="_blank">calendar.gamey.kr</a> 전체 캘린더로 이동합니다.
  <div class="divider"></div>
  Powered by GAMEY CALENDAR
</div>

<script>
  (function(){
    var pcHost = document.getElementById('gamey-calendar-embed-pc');
    pcHost.id = 'gamey-calendar-embed';
    var s1 = document.createElement('script');
    s1.src = './embed.js';
    s1.onload = function() {
      pcHost.id = 'gamey-calendar-embed-pc';
      setTimeout(function(){
        var mobileHost = document.getElementById('gamey-calendar-embed-mobile');
        mobileHost.id = 'gamey-calendar-embed';
        var s2 = document.createElement('script');
        s2.src = './embed.js?v=2';
        s2.onload = function() {
          mobileHost.id = 'gamey-calendar-embed-mobile';
        };
        document.body.appendChild(s2);
      }, 100);
    };
    document.body.appendChild(s1);
  })();
</script>

</body>
</html>
