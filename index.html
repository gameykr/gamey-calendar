<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAME CALENDAR</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preload" as="image" href="/logo.webp" imagesrcset="/logo.webp 1x, /logo@2x.webp 2x">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
/* ── RESET & VARIABLES ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --orange: #FF6F0F;
  --orange-light: #FFF3EB;
  --orange-mid: #FFD9BC;
  --gray-50: #F9F9F9;
  --gray-100: #F2F2F2;
  --gray-200: #E4E4E4;
  --gray-400: #ABABAB;
  --gray-600: #6E6E6E;
  --gray-800: #3A3A3A;
  --gray-900: #1A1A1A;
  --white: #FFFFFF;
  --release: #E8414A;
  --test: #E8873C;
  --reserve: #C8950A;
  --record: #2E7D6B;
  --event: #1B6CB2;
}

html { scroll-behavior: smooth; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--gray-50); color: var(--gray-900); min-height: 100vh; }

/* ════════════════════════════════════
   GNB
════════════════════════════════════ */
.gnb {
  position: sticky; top: 0; z-index: 300;
  background: white; border-bottom: 1px solid var(--gray-200);
}
.gnb-inner {
  display: flex; align-items: center;
  height: 64px; padding: 0 16px; gap: 10px;
  max-width: 1280px; margin: 0 auto;
}
.logo { display:flex; align-items:center; gap:8px; text-decoration:none; flex-shrink:0; }
.logo-icon { height:52px; width:auto; display:block; flex-shrink:0; }
.logo-text-line { display:flex; align-items:baseline; gap:5px; line-height:1; white-space:nowrap; }
.logo-gamey { font-size:15px; font-weight:900; color:var(--orange); letter-spacing:0.5px; }
.logo-calendar { font-size:19px; font-weight:900; color:var(--orange); letter-spacing:-0.3px; }
@media (min-width: 768px) {
  .logo-icon { height:60px; }
  .logo-gamey { font-size:17px; }
  .logo-calendar { font-size:22px; }
}

.gnb-search { flex: 1; position: relative; }
.gnb-search input {
  width: 100%; height: 38px;
  border: 1.5px solid var(--gray-200); border-radius: 10px;
  padding: 0 14px 0 38px;
  font-family: inherit; font-size: 14px;
  background: var(--gray-50); outline: none;
  transition: border-color 0.15s, background 0.15s;
}
.gnb-search input:focus { border-color: var(--orange); background: white; }
.gnb-search .s-icon {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  width: 15px; height: 15px; color: var(--gray-400); pointer-events: none;
}
.gnb-actions { display: flex; align-items: center; gap: 4px; }
.gnb-icon-btn {
  width: 38px; height: 38px; border-radius: 10px;
  border: none; background: transparent; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--gray-600); transition: background 0.12s;
}
.gnb-icon-btn:hover { background: var(--gray-100); }
.gnb-icon-btn svg { width: 20px; height: 20px; }
.gnb-login-btn {
  display: none; align-items: center; gap: 6px;
  padding: 7px 14px; border: none; border-radius: 8px;
  background: var(--orange); color: white;
  font-family: inherit; font-size: 13px; font-weight: 700;
  cursor: pointer; white-space: nowrap; transition: background 0.12s;
}
.gnb-login-btn:hover { background: #e85e00; }

/* ════════════════════════════════════
   FILTER BAR
════════════════════════════════════ */
.filter-sticky {
  position: sticky; top: 64px; z-index: 200;
  background: white; border-bottom: 1px solid var(--gray-200);
}
@media (min-width: 768px) { .filter-sticky { top: 72px; } }
.filter-inner { max-width: 1280px; margin: 0 auto; }
.filter-row { display:flex; align-items:center; gap:6px; overflow-x:auto; scrollbar-width:none; } /* legacy */
.filter-row::-webkit-scrollbar { display: none; }
.filter-sep { width: 1px; height: 20px; background: var(--gray-200); flex-shrink: 0; }

.chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 6px 12px; border-radius: 20px;
  font-size: 13px; font-weight: 600;
  cursor: pointer; border: 1.5px solid transparent;
  white-space: nowrap; flex-shrink: 0; transition: opacity 0.12s;
}
.chip:hover { opacity: 0.75; }
.chip-dot { width: 7px; height: 7px; border-radius: 50%; }
.chip.all      { background: var(--orange); color: white; border-color: var(--orange); }
.chip.release  { color: var(--release); border-color: var(--release); }
.chip.test     { color: var(--test); border-color: var(--test); }
.chip.reserve  { color: var(--reserve); border-color: var(--reserve); }
.chip.record   { color: var(--record); border-color: var(--record); }
.chip.event    { color: var(--event); border-color: var(--event); }
.chip.inactive { opacity: 0.4; }

.ptab {
  padding: 5px 11px; border-radius: 8px;
  font-size: 12px; font-weight: 600; cursor: pointer;
  background: var(--gray-100); color: var(--gray-600);
  white-space: nowrap; flex-shrink: 0; transition: all 0.12s;
}
.ptab.active { background: var(--gray-900); color: white; }

/* ════════════════════════════════════
   PAGE LAYOUT
════════════════════════════════════ */
.page {
  max-width: 1280px; margin: 0 auto;
  padding: 16px 16px 100px;
}
.content-wrap { width: 100%; }

/* ════════════════════════════════════
   Y PICK SECTION (추천 섹션)
════════════════════════════════════ */
.ypick-section {
  margin-bottom: 20px;
  display: none; /* 데이터 로드 후 표시 */
}
.ypick-section.visible { display: block; }

.ypick-header {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 12px; padding: 0 2px;
  flex-wrap: nowrap; min-width: 0;
}
.ypick-title {
  display: flex; align-items: center; gap: 8px;
  font-size: 15px; font-weight: 900; color: var(--gray-900);
  white-space: nowrap; min-width: 0; flex-shrink: 1;
  overflow: hidden; text-overflow: ellipsis;
}
.ypick-badge {
  display: inline-flex; align-items: center; gap: 4px;
  background: linear-gradient(135deg, #FF6F0F, #FF3D00);
  color: white; font-size: 12px; font-weight: 900;
  padding: 3px 10px; border-radius: 20px;
  letter-spacing: 0.5px;
  flex-shrink: 0; white-space: nowrap;
}
.ypick-sub { font-size: 12px; color: var(--gray-400); margin-left: auto; flex-shrink: 0; white-space: nowrap; }
@media (max-width: 767px) {
  .ypick-badge { font-size: 10px; padding: 2px 8px; }
  .ypick-title { font-size: 13px; }
  .ypick-sub { display: none; }
}

.ypick-scroll {
  display: flex; gap: 12px;
  overflow-x: auto;
  padding-bottom: 8px;
  scroll-behavior: smooth;
}
.ypick-scroll::-webkit-scrollbar { height: 4px; }
.ypick-scroll::-webkit-scrollbar-track { background: var(--gray-100); border-radius: 2px; }
.ypick-scroll::-webkit-scrollbar-thumb { background: var(--gray-300,#ccc); border-radius: 2px; }
.ypick-scroll::-webkit-scrollbar-thumb:hover { background: var(--orange); }
@media (min-width: 768px) {
  .ypick-scroll { scrollbar-width: thin; scrollbar-color: #ccc var(--gray-100); }
}

.ypick-card {
  flex-shrink: 0;
  width: 200px;
  background: white;
  border: 1.5px solid var(--gray-200);
  border-radius: 16px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
}
.ypick-card:hover {
  border-color: var(--orange);
  box-shadow: 0 6px 24px rgba(255,111,15,0.15);
  transform: translateY(-2px);
}
.ypick-thumb {
  width: 100%; height: 110px;
  background: var(--gray-100);
  display: flex; align-items: center; justify-content: center;
  font-size: 40px;
  position: relative;
  overflow: hidden;
}
.ypick-thumb img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }
.ypick-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 60%);
}
.ypick-y-stamp {
  position: absolute; top: 8px; right: 8px;
  background: linear-gradient(135deg, #FF6F0F, #FF3D00);
  color: white; font-size: 11px; font-weight: 900;
  width: 26px; height: 26px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(255,63,0,0.4);
  letter-spacing: -0.5px;
}
.ypick-info { padding: 10px 12px 12px; }
.ypick-cat-badge {
  font-size: 10px; font-weight: 700;
  padding: 2px 6px; border-radius: 4px;
  display: inline-block; margin-bottom: 5px;
}
.ypick-name {
  font-size: 13px; font-weight: 700; line-height: 1.35;
  overflow: hidden; text-overflow: ellipsis;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  margin-bottom: 6px;
}
.ypick-meta { font-size: 11px; color: var(--gray-400); }
.ypick-platforms { display: flex; gap: 3px; margin-top: 5px; }

/* ════════════════════════════════════
   EVENT BANNER
════════════════════════════════════ */
.event-banner {
  background: white; border: 1px solid var(--gray-200);
  border-radius: 14px; overflow: hidden; cursor: pointer;
  display: flex; align-items: stretch;
  margin-bottom: 10px; transition: all 0.15s;
}
.event-banner:hover { border-color: var(--event); box-shadow: 0 4px 16px rgba(27,108,178,0.1); }
.ev-thumb {
  width: 72px; flex-shrink: 0;
  background: linear-gradient(135deg, #1B2838, #2a475e);
  display: flex; align-items: center; justify-content: center; font-size: 28px;
  position: relative; overflow: hidden;
}
.ev-body {
  padding: 12px 14px; flex: 1; min-width: 0;
  display: flex; flex-direction: column; justify-content: center; gap: 4px;
}
.ev-period {
  font-size: 11px; font-weight: 700; color: var(--event);
  background: #E6F0FA; display: inline-flex; padding: 2px 8px;
  border-radius: 5px; width: fit-content;
}
.ev-title { font-size: 14px; font-weight: 700; }
.ev-sub   { font-size: 12px; color: var(--gray-600); }
.ev-live  {
  margin: auto 14px auto auto; flex-shrink: 0;
  background: var(--event); color: white;
  font-size: 11px; font-weight: 700;
  padding: 4px 10px; border-radius: 6px;
}

/* ════════════════════════════════════
   DATE SECTION & GAME LIST
════════════════════════════════════ */
.date-section { margin-bottom: 4px; }
.date-header {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 2px 8px;
}
.date-label { font-size: 13px; font-weight: 700; color: var(--gray-600); white-space: nowrap; }
.date-today-tag {
  font-size: 11px; font-weight: 700;
  background: var(--orange); color: white;
  padding: 2px 8px; border-radius: 6px;
}
.date-line { flex: 1; height: 1px; background: var(--gray-200); }

.game-list { display: flex; flex-direction: column; }

.game-card {
  background: white;
  border-top: 1px solid var(--gray-100);
  display: flex; align-items: center; gap: 14px;
  padding: 14px 4px; cursor: pointer; transition: background 0.1s;
}
.game-card:first-child { border-radius: 14px 14px 0 0; border: 1px solid var(--gray-200); }
.game-card:last-child  { border-radius: 0 0 14px 14px; border-bottom: 1px solid var(--gray-200); margin-bottom: 12px; }
.game-card:only-child  { border-radius: 14px; border: 1px solid var(--gray-200); margin-bottom: 12px; }
.game-card:hover { background: var(--gray-50); }
.game-card.featured { border-left: 3px solid var(--orange) !important; padding-left: 12px; }

.card-thumb {
  width: 80px; height: 80px; border-radius: 12px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 30px; background: var(--gray-100); overflow: hidden;
  position: relative;
}
.card-thumb img { width: 100%; height: 100%; object-fit: cover; }
.card-y-stamp {
  position: absolute; top: 4px; right: 4px;
  background: var(--orange); color: white;
  font-size: 9px; font-weight: 900;
  width: 18px; height: 18px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}

.card-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 5px; }
.card-badges { display: flex; gap: 4px; flex-wrap: wrap; }
.badge { font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 4px; }
.badge-release { background: #FDECEA; color: var(--release); }
.badge-test    { background: #FEF3E9; color: var(--test); }
.badge-reserve { background: #FDF8E6; color: var(--reserve); }
.badge-record  { background: #E8F4F1; color: var(--record); }
.badge-event   { background: #E6F0FA; color: var(--event); }
.badge-genre   { background: var(--gray-100); color: var(--gray-600); }

.card-title {
  font-size: 14px; font-weight: 700; line-height: 1.35;
  overflow: hidden; text-overflow: ellipsis;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
}
.card-meta { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--gray-400); }
.meta-dot { width: 2px; height: 2px; border-radius: 50%; background: var(--gray-400); }

.platform-icons { display: flex; gap: 3px; }
.picon {
  display: inline-flex; align-items: center; justify-content: center;
  width: 22px; height: 22px; border-radius: 5px;
  font-size: 0;
}
.picon-PC { background: #E8F0FE; color: #1565C0; }
.picon-PS { background: #E8EBF8; color: #003087; }
.picon-XB { background: #E8F5E9; color: #107C10; }
.picon-NS { background: #FDECEA; color: #E60012; }
.picon-MO { background: #F3E5F5; color: #7B1FA2; }

/* ════════════════════════════════════
   LOADING / EMPTY
════════════════════════════════════ */
.skeleton-list { display: flex; flex-direction: column; gap: 1px; }
.skeleton-card {
  background: white; border-radius: 14px; border: 1px solid var(--gray-200);
  padding: 14px; display: flex; gap: 14px; margin-bottom: 4px;
}
.sk-thumb {
  width: 80px; height: 80px; border-radius: 12px;
  background: linear-gradient(90deg, var(--gray-100) 25%, var(--gray-200) 50%, var(--gray-100) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  flex-shrink: 0;
}
.sk-body { flex: 1; display: flex; flex-direction: column; gap: 8px; justify-content: center; }
.sk-line {
  height: 12px; border-radius: 6px;
  background: linear-gradient(90deg, var(--gray-100) 25%, var(--gray-200) 50%, var(--gray-100) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
}
.sk-line.short { width: 40%; }
.sk-line.mid   { width: 65%; }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

.empty-msg {
  text-align: center; padding: 60px 20px;
  color: var(--gray-400); font-size: 14px; line-height: 2;
}
.empty-msg .ico { font-size: 40px; display: block; margin-bottom: 8px; }

/* ════════════════════════════════════
   SIDEBAR (PC)
════════════════════════════════════ */
.sidebar-right { display: none; }

.widget {
  background: white; border: 1px solid var(--gray-200);
  border-radius: 16px; padding: 20px; margin-bottom: 16px;
}
.widget-title {
  font-size: 13px; font-weight: 700; color: var(--gray-800);
  margin-bottom: 14px; display: flex; align-items: center; gap: 6px;
}
.widget-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--orange); }

.mini-cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.mini-cal-month { font-size: 14px; font-weight: 700; }
.mini-cal-navs { display: flex; gap: 4px; }
.mini-cal-navs button {
  width: 24px; height: 24px; border: none;
  background: var(--gray-100); border-radius: 6px;
  cursor: pointer; font-size: 12px; color: var(--gray-600);
  display: flex; align-items: center; justify-content: center;
}
.mini-cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; text-align: center; }
.cal-dow { font-size: 10px; font-weight: 700; color: var(--gray-400); padding: 4px 0; }
.cal-day {
  font-size: 12px; font-weight: 500; padding: 5px 2px;
  border-radius: 6px; cursor: pointer; color: var(--gray-800); line-height: 1;
}
.cal-day:hover { background: var(--gray-100); }
.cal-day.today { background: var(--orange); color: white; font-weight: 700; }
.cal-day.has-event { position: relative; }
.cal-day.has-event::after {
  content:''; display: block; width: 3px; height: 3px;
  background: var(--orange); border-radius: 50%; margin: 1px auto 0;
}
.cal-day.today::after { background: white; }
.cal-day.empty { color: transparent; pointer-events: none; }
.cal-day.sun { color: #E8414A; }
.cal-day.sat { color: var(--event); }
.cal-day.today.sun, .cal-day.today.sat { color: white; }

.snav-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 10px; border-radius: 10px; cursor: pointer;
  font-size: 14px; font-weight: 500; color: var(--gray-800);
  transition: background 0.12s; margin-bottom: 2px;
}
.snav-item:hover { background: var(--gray-100); }
.snav-item.active { background: var(--orange-light); color: var(--orange); font-weight: 700; }
.snav-left { display: flex; align-items: center; gap: 9px; }
.cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.cnt-badge { font-size: 11px; font-weight: 700; background: var(--gray-100); color: var(--gray-600); padding: 2px 7px; border-radius: 10px; }
.snav-item.active .cnt-badge { background: var(--orange-mid); color: var(--orange); }

.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.stat-item { background: var(--gray-50); border-radius: 10px; padding: 12px; text-align: center; }
.stat-num   { font-size: 22px; font-weight: 900; color: var(--orange); }
.stat-label { font-size: 11px; color: var(--gray-600); margin-top: 2px; }

.upcoming-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 0; border-bottom: 1px solid var(--gray-100); cursor: pointer;
}
.upcoming-item:last-child { border-bottom: none; }
.upcoming-item:hover .up-title { color: var(--orange); }
.up-date-box {
  width: 40px; height: 40px; border-radius: 10px;
  background: var(--gray-100);
  display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0;
}
.up-date-box.today { background: var(--orange); }
.up-month { font-size: 9px; font-weight: 700; color: var(--gray-400); line-height: 1; }
.up-date-box.today .up-month { color: rgba(255,255,255,0.7); }
.up-day { font-size: 16px; font-weight: 900; color: var(--gray-800); line-height: 1.1; }
.up-date-box.today .up-day { color: white; }
.up-info { flex: 1; min-width: 0; }
.up-title { font-size: 13px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; transition: color 0.12s; }
.up-meta  { font-size: 11px; color: var(--gray-400); margin-top: 2px; }

/* ════════════════════════════════════
   BOTTOM NAV
════════════════════════════════════ */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 300;
  background: white; border-top: 1px solid var(--gray-200);
  display: flex; padding: 8px 0 max(16px, env(safe-area-inset-bottom));
}
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 4px 0; }
.nav-item svg { width: 22px; height: 22px; color: var(--gray-400); }
.nav-item.active svg { color: var(--orange); }
.nav-label { font-size: 10px; font-weight: 600; color: var(--gray-400); }
.nav-item.active .nav-label { color: var(--orange); }

/* ════════════════════════════════════
   RESPONSIVE — TABLET 768+
════════════════════════════════════ */
@media (min-width: 768px) {
  .gnb-inner { height: 72px; padding: 0 24px; gap: 16px; }
  .filter-sticky { top: 72px; }
  .filter-row { padding: 10px 24px; gap: 8px; }
  .gnb-login-btn { display: flex; }
  .gnb-search { max-width: 380px; }
  .bottom-nav { display: none; }
  .page { padding: 20px 24px 40px; }

  .game-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .game-card {
    border-radius: 14px !important; border: 1px solid var(--gray-200) !important;
    padding: 14px !important; margin-bottom: 0 !important; transition: all 0.15s;
  }
  .game-card:hover {
    border-color: var(--orange) !important;
    box-shadow: 0 4px 16px rgba(255,111,15,0.1);
    transform: translateY(-1px);
  }
  .game-card.featured { border-left: 3px solid var(--orange) !important; }

  .ypick-card { width: 180px; }
  .ev-thumb { width: 100px; font-size: 36px; }
}

/* ════════════════════════════════════
   RESPONSIVE — PC 1080+
════════════════════════════════════ */
@media (min-width: 1080px) {
  .gnb-inner { padding: 0 32px; }
  .filter-row { padding: 10px 32px; }

  .page {
    padding: 28px 32px 48px;
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 24px; align-items: start;
  }

  
  
  

  .sidebar-right {
    display: block;
    position: sticky; top: calc(72px + 53px + 16px);

/* ── 반응형 필터 */
.filter-wrap {
  display: flex;
  flex-direction: column; /* 모바일: 세로 */
  width: 100%;
}
.filter-group {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 16px;
  overflow-x: auto;
  scrollbar-width: none;
  flex-shrink: 0;
  border-bottom: 1px solid var(--gray-100);
}
.filter-group:last-child { border-bottom: none; }
.filter-group::-webkit-scrollbar { display: none; }
.filter-vsep { display: none; } /* 모바일에선 숨김 */

@media (min-width: 768px) {
  .filter-wrap {
    flex-direction: row; /* 태블릿/PC: 가로 한 줄 */
    align-items: center;
    overflow-x: auto;
    scrollbar-width: none;
    padding: 0;
  }
  .filter-wrap::-webkit-scrollbar { display: none; }
  .filter-group {
    border-bottom: none;
    padding: 9px 8px;
    flex-shrink: 0;
  }
  .filter-group:first-child { padding-left: 16px; }
  .filter-group:last-child  { padding-right: 16px; }
  .filter-vsep {
    display: block;
    width: 1px; height: 20px;
    background: var(--gray-200);
    flex-shrink: 0;
  }
}
@media (min-width: 1080px) {
  .filter-group:first-child { padding-left: 32px; }
  .filter-group:last-child  { padding-right: 32px; }
}

/* ── 검색 오버레이 */
.search-overlay {
  position: fixed; inset: 0; z-index: 600;
  background: rgba(0,0,0,.45);
  display: none; align-items: flex-start; justify-content: flex-end;
}
.search-overlay.open { display: flex; }

.search-panel {
  width: 100%; max-width: 560px; height: 100%;
  background: white;
  display: flex; flex-direction: column;
  transform: translateX(100%);
  transition: transform .3s cubic-bezier(.32,.72,0,1);
}
.search-overlay.open .search-panel { transform: translateX(0); }

.search-header {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--gray-200);
  flex-shrink: 0;
}
.search-input-wrap {
  flex: 1; display: flex; align-items: center;
  background: var(--gray-100); border-radius: 10px;
  padding: 0 12px; gap: 8px;
}
.search-input-wrap svg { width: 16px; height: 16px; color: var(--gray-400); flex-shrink: 0; }
.search-real-input {
  flex: 1; border: none; background: transparent;
  font-family: inherit; font-size: 15px; outline: none;
  padding: 10px 0; color: var(--gray-900);
}
.search-real-input::placeholder { color: var(--gray-400); }
.search-close-btn {
  padding: 7px 14px; border: none; border-radius: 8px;
  background: var(--gray-100); font-family: inherit;
  font-size: 14px; font-weight: 600; color: var(--gray-600);
  cursor: pointer; flex-shrink: 0; white-space: nowrap;
  transition: background .12s;
}
.search-close-btn:hover { background: var(--gray-200); }

.search-body {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
}
.search-result-header {
  padding: 12px 16px 8px;
  font-size: 13px; color: var(--gray-600);
}
.search-result-header strong { color: var(--orange); }

.search-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--gray-100);
  cursor: pointer; transition: background .1s;
}
.search-item:hover { background: var(--gray-50); }
.search-item:last-child { border-bottom: none; }

.search-item-date {
  min-width: 52px; text-align: center; flex-shrink: 0;
}
.search-item-date .s-date-day { font-size: 13px; font-weight: 700; color: var(--gray-800); }
.search-item-date .s-date-dow { font-size: 11px; color: var(--gray-400); }

.search-item-body { flex: 1; min-width: 0; }
.search-item-badges { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 5px; }
.search-item-title {
  font-size: 14px; font-weight: 700; line-height: 1.35;
  overflow: hidden; text-overflow: ellipsis;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  margin-bottom: 4px;
}
.search-item-title mark {
  background: #FFF176; color: var(--gray-900);
  border-radius: 2px; padding: 0 1px;
}
.search-item-meta {
  display: flex; align-items: center; gap: 5px;
  font-size: 12px; color: var(--gray-400);
}
.search-empty {
  text-align: center; padding: 60px 20px;
  color: var(--gray-400); font-size: 14px; line-height: 2;
}
.search-empty .ico { font-size: 40px; display: block; margin-bottom: 8px; }

/* ── 이미지 성능 최적화 */
img {
  content-visibility: auto;
}
.card-thumb img, .ypick-thumb img, .ev-thumb img {
  will-change: opacity;
  transition: opacity .2s ease;
}



/* ── PC 필터바: 한 줄에 전부 표시 (스크롤 없음) */
@media (min-width: 1080px) {
  .filter-wrap {
    flex-direction: row;
    flex-wrap: nowrap;
    align-items: center;
    padding: 6px 32px;
  }
  .filter-group {
    border-bottom: none !important;
    padding: 0;
    overflow-x: visible;
    flex-wrap: nowrap;
  }
  .filter-group .chip,
  .filter-group .ptab { flex-shrink: 0; }
  .filter-vsep { display: block !important; }
  .filter-sticky { border-bottom: 1px solid var(--gray-200); }
}

/* ── 패널 리디자인 */
.detail-panel {
  max-width: 560px !important;
}
.panel-hero {
  height: 240px !important;
}
.panel-hero-title {
  font-size: 20px !important;
  font-weight: 900 !important;
}
.panel-content {
  padding: 0 0 80px !important;
}
.panel-info-list {
  margin: 0 !important;
  border-bottom: 1px solid var(--gray-100);
}
.panel-info-row {
  padding: 10px 16px !important;
  display: flex;
  align-items: flex-start;
}
.panel-info-label {
  width: 76px !important;
  font-size: 12px !important;
  font-weight: 700 !important;
  color: var(--gray-400) !important;
  flex-shrink: 0;
  padding-top: 1px;
}
.panel-info-value {
  font-size: 14px !important;
  font-weight: 500 !important;
  color: var(--gray-800) !important;
  flex: 1;
  min-width: 0;
}
.panel-meta-section {
  padding: 0 !important;
  border-bottom: 1px solid var(--gray-100);
}
.panel-meta-row {
  padding: 10px 16px !important;
}
.panel-meta-label {
  width: 76px !important;
}
.store-links {
  padding: 12px 16px !important;
  border-bottom: 1px solid var(--gray-100);
  gap: 6px !important;
}
.store-links:empty { display: none; }
.store-btn {
  padding: 7px 12px !important;
  font-size: 12px !important;
}
.panel-desc {
  margin: 12px 16px !important;
  font-size: 14px !important;
}
.youtube-thumb {
  margin: 0 16px 12px !important;
  border-radius: 10px !important;
}
.panel-add-btn {
  margin: 0 16px 0 !important;
  border-radius: 10px !important;
}
.comment-section {
  padding: 16px !important;
}

/* 패널 상단 공유 버튼 */
.panel-share-btn {
  position: absolute;
  top: 12px; right: 12px;
  width: 36px; height: 36px;
  background: rgba(255,255,255,.9);
  border: none; border-radius: 50%;
  cursor: pointer; z-index: 10;
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
  transition: transform .15s;
}
.panel-share-btn:hover { transform: scale(1.1); background: white; box-shadow: 0 4px 12px rgba(0,0,0,.18); }
.panel-share-btn svg { width: 18px; height: 18px; color: var(--gray-800); }

/* ════════════════════════════════════
   패널 v2 — 슬라이드 상세 리디자인
════════════════════════════════════ */
/* 메타 카드: 입력 순서대로 깔끔하게 */
.pv2-meta-card {
  margin: 14px 16px 0;
  background: var(--gray-50);
  border: 1px solid var(--gray-100);
  border-radius: 14px;
  padding: 4px 14px;
}
.pv2-meta-row {
  display: flex; align-items: flex-start;
  padding: 11px 0;
  border-bottom: 1px dashed var(--gray-200);
  gap: 10px;
}
.pv2-meta-row:last-child { border-bottom: none; }
.pv2-meta-label {
  width: 72px; flex-shrink: 0;
  font-size: 12px; font-weight: 800;
  color: var(--gray-600);
  letter-spacing: -0.2px;
  padding-top: 2px;
  display: flex; align-items: center; gap: 5px;
}
.pv2-meta-label .pv2-ico { font-size: 13px; opacity: .85; }
.pv2-meta-value {
  flex: 1; min-width: 0;
  font-size: 14px; font-weight: 600; color: var(--gray-900);
  line-height: 1.5;
  word-break: break-word;
}
.pv2-meta-value .pv2-plats { display: flex; gap: 5px; flex-wrap: wrap; }
.pv2-meta-value .pv2-plats .picon { width: 26px; height: 26px; font-size: 10px; border-radius: 6px; }
.pv2-meta-value .pv2-tier-inline {
  display: inline-flex; align-items: center; gap: 6px;
}
.pv2-meta-value .pv2-tier-inline .tier-badge { width: 22px; height: 22px; font-size: 11px; }

/* 100자 설명 — 강조 파란 박스 (이것만 파란색!) */
.pv2-desc {
  margin: 14px 16px;
  padding: 16px 18px;
  background: linear-gradient(135deg, #EAF5FE 0%, #DFF0FC 100%);
  border-left: 4px solid #3DA9F5;
  border-radius: 12px;
  font-size: 14.5px; line-height: 1.7;
  color: #154A73; font-weight: 500;
  white-space: pre-line; word-break: keep-all;
  position: relative;
  box-shadow: 0 2px 8px rgba(61,169,245,.08);
}
.pv2-desc::before {
  content: '"';
  position: absolute;
  top: -8px; left: 12px;
  font-size: 38px; font-weight: 900;
  color: #3DA9F5; opacity: .35;
  line-height: 1;
  font-family: Georgia, serif;
}

/* 공식 링크 — 크고 눈에 띄는 CTA 버튼 */
.pv2-cta-wrap { padding: 0 16px; margin-bottom: 14px; }
.pv2-cta-btn {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; padding: 16px 18px;
  background: linear-gradient(135deg, var(--orange) 0%, #FF8A2E 100%);
  color: white; border: none; border-radius: 14px;
  font-family: inherit; font-size: 15px; font-weight: 800;
  cursor: pointer; text-decoration: none;
  box-shadow: 0 4px 14px rgba(255,111,15,.32);
  transition: transform .15s, box-shadow .15s;
  letter-spacing: -0.2px;
}
.pv2-cta-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 18px rgba(255,111,15,.42);
}
.pv2-cta-btn svg { width: 18px; height: 18px; flex-shrink: 0; }
.pv2-cta-btn .pv2-cta-arrow {
  margin-left: auto;
  width: 16px; height: 16px;
  opacity: .9;
}

/* 유튜브 영역 (위치만 조정) */
.pv2-youtube-wrap { margin: 0 16px 14px; }
.pv2-youtube-wrap .youtube-thumb { margin: 0 !important; }

/* 스토어 링크 — 아이콘 + 구분선 */
.pv2-store-section {
  margin: 0 16px 16px;
  padding: 14px 0 4px;
  border-top: 1px solid var(--gray-100);
}
.pv2-store-title {
  font-size: 11px; font-weight: 800;
  color: var(--gray-400);
  letter-spacing: 0.6px;
  margin-bottom: 10px;
  text-transform: uppercase;
}
.pv2-store-grid {
  display: flex; flex-direction: column;
  border: 1px solid var(--gray-100);
  border-radius: 12px;
  overflow: hidden;
  background: white;
}
.pv2-store-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px;
  text-decoration: none;
  color: var(--gray-800);
  border-bottom: 1px solid var(--gray-100);
  transition: background .12s;
  font-size: 13.5px; font-weight: 700;
}
.pv2-store-item:last-child { border-bottom: none; }
.pv2-store-item:hover { background: var(--gray-50); }
.pv2-store-icon {
  width: 32px; height: 32px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; color: white;
}
.pv2-store-icon svg { width: 18px !important; height: 18px !important; fill: currentColor !important; stroke: currentColor; }
.pv2-store-icon.steam     { background: #1b2838; }
.pv2-store-icon.ps        { background: #003087; }
.pv2-store-icon.xbox      { background: #107c10; }
.pv2-store-icon.nintendo  { background: #e60012; }
.pv2-store-icon.googleplay{ background: #01875F; }
.pv2-store-icon.appstore  { background: #000; }
.pv2-store-arrow {
  margin-left: auto;
  width: 14px; height: 14px;
  color: var(--gray-400);
  flex-shrink: 0;
}

/* 하단 액션 바 — 작은 아이콘 일정 추가 + 보조 액션 */
.pv2-action-bar {
  display: flex; align-items: center; justify-content: flex-end;
  gap: 8px; padding: 4px 16px 16px;
  border-top: 1px dashed var(--gray-200);
  margin-top: 4px;
}
.pv2-icon-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 12px;
  background: white;
  border: 1.5px solid var(--gray-200);
  border-radius: 10px;
  cursor: pointer;
  font-family: inherit; font-size: 12px; font-weight: 700;
  color: var(--gray-600);
  transition: all .12s;
}
.pv2-icon-btn:hover { border-color: var(--orange); color: var(--orange); background: var(--orange-light); }
.pv2-icon-btn svg { width: 14px; height: 14px; }
.pv2-icon-btn.primary { border-color: var(--orange); color: var(--orange); background: var(--orange-light); }

/* 모바일 최적화 */
@media (max-width: 480px) {
  .pv2-meta-card { margin: 12px 12px 0; padding: 2px 12px; }
  .pv2-meta-row { padding: 10px 0; }
  .pv2-meta-label { width: 64px; font-size: 11.5px; }
  .pv2-meta-value { font-size: 13.5px; }
  .pv2-desc { margin: 12px; padding: 14px 16px; font-size: 14px; }
  .pv2-cta-wrap { padding: 0 12px; margin-bottom: 12px; }
  .pv2-cta-btn { padding: 14px 16px; font-size: 14.5px; }
  .pv2-youtube-wrap { margin: 0 12px 12px; }
  .pv2-store-section { margin: 0 12px 12px; }
  .pv2-store-item { padding: 11px 12px; font-size: 13px; }
  .pv2-store-icon { width: 30px; height: 30px; }
  .pv2-action-bar { padding: 4px 12px 14px; }
}

/* 기존 .panel-add-btn 큰 버튼은 v2에서 사용 안 함 (호환용 유지) */
.pv2-hide { display: none !important; }
/* ════════════════════════════════════
   MONTH NAVIGATOR (연/월 점프)
   ════════════════════════════════════ */
.mnav-wrap { position: relative; flex-shrink: 0; }
.mnav-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px; border-radius: 20px;
  border: 1.5px solid var(--orange); background: white;
  color: var(--orange); font-family: inherit;
  font-size: 13px; font-weight: 700; cursor: pointer;
  white-space: nowrap; transition: all 0.12s;
}
.mnav-btn:hover { background: var(--orange-light); }
.mnav-btn.active { background: var(--orange); color: white; }
.mnav-btn .mnav-cal-ico { font-size: 14px; line-height: 1; }
.mnav-btn .mnav-arrow { font-size: 10px; opacity: 0.7; }

.mnav-popup {
  display: none;
  position: fixed; top: 0; left: 0;
  width: 280px; padding: 16px;
  background: white; border: 1px solid var(--gray-200);
  border-radius: 14px; box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  z-index: 1000;
}
.mnav-popup.open { display: block; }
.mnav-label {
  display: block; font-size: 11px; font-weight: 700;
  color: var(--gray-400); margin-bottom: 6px;
  letter-spacing: 0.5px;
}
.mnav-year-row { display: flex; gap: 6px; margin-bottom: 14px; }
.mnav-year-select {
  flex: 1; padding: 8px 10px;
  border: 1.5px solid var(--gray-200); border-radius: 8px;
  font-family: inherit; font-size: 14px; font-weight: 700;
  color: var(--gray-800); background: white;
  outline: none; cursor: pointer;
}
.mnav-year-select:focus { border-color: var(--orange); }
.mnav-year-nav {
  width: 34px; height: 34px; border-radius: 8px;
  border: 1.5px solid var(--gray-200); background: white;
  cursor: pointer; color: var(--gray-600);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; flex-shrink: 0;
  transition: all 0.12s;
}
.mnav-year-nav:hover { border-color: var(--orange); color: var(--orange); }
.mnav-month-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 6px; margin-bottom: 14px;
}
.mnav-month-cell {
  padding: 9px 0; border-radius: 8px;
  border: 1.5px solid var(--gray-200); background: white;
  font-family: inherit; font-size: 13px; font-weight: 700;
  color: var(--gray-800); cursor: pointer;
  transition: all 0.12s;
}
.mnav-month-cell:hover { border-color: var(--orange); color: var(--orange); }
.mnav-month-cell.selected {
  background: var(--orange); color: white; border-color: var(--orange);
}
.mnav-month-cell.current {
  border-color: var(--orange); color: var(--orange);
}
.mnav-month-cell.selected.current { color: white; }
.mnav-btn-row { display: flex; gap: 6px; }
.mnav-action-btn {
  flex: 1; padding: 10px; border-radius: 10px;
  font-family: inherit; font-size: 13px; font-weight: 700;
  cursor: pointer; transition: all 0.12s; border: none;
}
.mnav-today-btn {
  background: var(--gray-100); color: var(--gray-600);
}
.mnav-today-btn:hover { background: var(--gray-200); }
.mnav-go-btn {
  background: var(--orange); color: white;
}
.mnav-go-btn:hover { background: #e85e00; }

/* 모바일: 팝업 너비만 조정 (위치는 JS가 계산) */
@media (max-width: 500px) {
  .mnav-popup { width: calc(100vw - 24px); max-width: 320px; }
}
</style>
</head>

<!-- ════ FILTER BAR ════ -->
<div class="filter-sticky">
  <div class="filter-inner">
    <div class="filter-wrap">
      <!-- 카테고리 그룹 -->
      <div class="filter-group" id="filterRow">

/* ════════════════════════════════════
   HTML STRIP
════════════════════════════════════ */
function stripHtml(str) {
  if (!str) return '';
  return str
    .replace(/<br\s*\/?>/gi,'\n')
    .replace(/<\/p>/gi,'\n')
    .replace(/<[^>]+>/g,'')
    .replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>')
    .replace(/&nbsp;/g,' ').replace(/&#39;/g,"'").replace(/&quot;/g,'"');
}

/* ════════════════════════════════════
   PLATFORM NORMALIZE
════════════════════════════════════ */
function parsePlats(str) {
  const result = [];
  str.split(/[\/,]+/).forEach(s => {
    const u = s.trim().toUpperCase().replace(/\s+/g,'');
    if (u === 'PC') result.push('PC');
    else if (/^(PS[45S]?|PLAYSTATION\d*|P5|플스)$/.test(u)) result.push('PS');
    else if (/^(XB[OSS]?|XS|XBOX.*|SERIES[XS]?)$/.test(u) || u.startsWith('XBOX')) result.push('XB');
    else if (/^(NS\d?|NSW|SWITCH\d?|닌텐도|NINTENDO.*)$/.test(u)) result.push('NS');
    else if (/^(MO|MOBILE|모바일|안드로이드|IOS|AOS|APP)$/.test(u)) result.push('MO');
  });
  return [...new Set(result)];
}

/* ════════════════════════════════════
   PARSE EVENT
════════════════════════════════════ */
function parseEvent(item, cat) {
  const startRaw = item.start.date || item.start.dateTime;
  const d = new Date(startRaw);
  const dateStr = `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;

  // 종료일
  let endStr = '';
  const endRaw = item.end?.date || item.end?.dateTime;
  if (endRaw) {
    let ed;
    if (item.end.date) {
      const [ey,em,eday] = item.end.date.split('-').map(Number);
      ed = new Date(ey, em-1, eday);
      ed.setDate(ed.getDate() - 1);
    } else { ed = new Date(item.end.dateTime); }
    const eStr = `${ed.getFullYear()}.${String(ed.getMonth()+1).padStart(2,'0')}.${String(ed.getDate()).padStart(2,'0')}`;
    if (eStr !== dateStr) endStr = eStr;
  }

  const summary = item.summary || '';

  // ① [] 플랫폼 파싱
  let plat = [];
  const sqRe = /\[([^\]]*)\]/g;
  let sm;
  while ((sm = sqRe.exec(summary)) !== null) {
    plat = [...new Set([...plat, ...parsePlats(sm[1])])];
  }
  const hasSquare = plat.length > 0;
  const summaryNoSq = summary.replace(/\s*\[[^\]]*\]/g,'').trim();

  // ② () 파싱 ([] 없을 때만 플랫폼 읽기, 하위 호환)
  let title = summaryNoSq;
  let classify = '';
  const brRe = /\(([^)]*)\)/g;
  let bm;
  const groups = [];
  while ((bm = brRe.exec(summaryNoSq)) !== null) groups.push(bm[1].trim());

  if (!hasSquare) {
    let nonPlatCount = 0;
    for (const g of groups) {
      const pp = parsePlats(g);
      if (pp.length) {
        plat = [...new Set([...plat, ...pp])];
        title = title.replace(`(${g})`,'').trim();
      } else {
        nonPlatCount++;
        if (nonPlatCount === 1) { classify = g; title = title.replace(`(${g})`,'').trim(); }
      }
    }
  }
  title = title.trim();

  // ③ description 파싱
  let featured = false;
  let imageUrl = '';
  let tier = '';
  if (item.description) {
    const raw = item.description;
    const clean = stripHtml(raw);

    // 키:값 라인 파싱
    for (const line of clean.split('\n')) {
      const m = line.match(/^([^:：]{1,20})[：:]\s*(.+)/);
      if (!m) continue;
      const key = m[1].trim().replace(/^[\s•\-\*\·\▪\▸\►\○\●\◆\◇\☆\★]+/, '').toLowerCase().replace(/\s/g,'');
      const val = m[2].trim();
      if (/^플랫폼$|^platform$/.test(key) && val) {
        const dp = parsePlats(val);
        if (dp.length) plat = [...new Set([...plat, ...dp])];
      }
      if (/^분류$|^장르$|^genre$|^category$/.test(key) && val && !classify) classify = val;
      if (/^비고$|^memo$|^note$/.test(key) && val && !classify) classify = val;
      if (/^추천$|^hot$|^best$|^featured$|^pick$/.test(key)) {
        featured = /^(y|yes|true|1|o)$/i.test(val.toLowerCase());
        if (featured && !tier) tier = 'S'; // 추천:Y → S등급으로 통합
      }
      if (/^이미지$|^image$|^img$|^thumbnail$|^썸네일$/.test(key) && val) imageUrl = val;
      if (/^등급$|^티어$|^tier$|^grade$|^rank$/.test(key) && val) tier = val.toUpperCase().replace(/\s/g,'').slice(0,2);
    }

    // 폴백: 키 파싱 실패 시 description에서 이미지 URL 직접 추출
    if (!imageUrl) {
      // href 속성에서 이미지 URL 추출 (Google Calendar는 링크를 <a href="">로 감쌈)
      const hrefMatch = raw.match(/href=["']([^"']*\.(?:jpg|jpeg|png|gif|webp|JPG|PNG|JPEG)[^"']*?)["']/);
      if (hrefMatch) imageUrl = hrefMatch[1];
    }
    if (!imageUrl) {
      // plain URL에서 이미지 확장자 추출
      const urlMatch = clean.match(/https?:\/\/[^\s"'<>]+\.(?:jpg|jpeg|png|gif|webp)(?:[?#][^\s"'<>]*)?/i);
      if (urlMatch) imageUrl = urlMatch[0];
    }
  }

  // 개발사/퍼블리셔/스토어 파싱
  let developer = '', publisher = '', storeLinks = {};
  if (item.description) {
    const clean2 = stripHtml(item.description);
    for (const line of clean2.split('\n')) {
      const m2 = line.match(/^([^:：]{1,20})[：:]\s*(.+)/);
      if (!m2) continue;
      const k = m2[1].trim().replace(/^[\s•\-\*\·\▪\▸\►\○\●\◆\◇]+/, '').toLowerCase().replace(/\s/g,'');
      const v = m2[2].trim();
      if (/^개발사$|^developer$|^dev$/.test(k)) developer = v;
      if (/^퍼블리셔$|^publisher$|^pub$/.test(k)) publisher = v;
      if (/^steam$|^스팀$/.test(k)) storeLinks.steam = v;
      if (/^playstation$|^ps$|^psstore$/.test(k)) storeLinks.ps = v;
      if (/^xbox$|^xb$|^xboxstore$/.test(k)) storeLinks.xbox = v;
      if (/^nintendo$|^ns$|^eshop$|^닌텐도$/.test(k)) storeLinks.nintendo = v;
      if (/^공식사이트$|^official$|^website$|^홈페이지$/.test(k)) storeLinks.official = v;
      if (/^appstore$|^앱스토어$|^ios$/.test(k)) storeLinks.appstore = v;
      if (/^googleplay$|^구글플레이$|^aos$|^android$/.test(k)) storeLinks.googleplay = v;
    }
  }
  return { date: dateStr, endDate: endStr, cat, title, plat, classify, featured, imageUrl, tier, developer, publisher, storeLinks, raw: item };
}

/* ════════════════════════════════════
   FETCH CALENDAR
════════════════════════════════════ */
async function fetchCalendar(cat, calId, timeMin, timeMax) {
  const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calId)}/events?`
    + new URLSearchParams({ key: API_KEY, timeMin, timeMax, singleEvents: true, orderBy: 'startTime', maxResults: 200 });
  const r = await fetch(url);
  if (!r.ok) throw new Error(`[${cat}] ${r.status}`);
  const data = await r.json();
  return (data.items || []).map(item => parseEvent(item, cat));
}

/* ════════════════════════════════════
   LOAD DATA
════════════════════════════════════ */
async function loadData() {
  showSkeleton();
  const y = viewYear, m = viewMonth;
  const timeMin = new Date(y, m-1, 1).toISOString();
  const timeMax = new Date(y, m, 1).toISOString();

  const results = await Promise.allSettled(
    Object.entries(CALENDAR_IDS).map(([cat, id]) => fetchCalendar(cat, id, timeMin, timeMax))
  );

  allEvents = [];
  const errors = [];
  results.forEach(r => {
    if (r.status === 'fulfilled') allEvents.push(...r.value);
    else errors.push(r.reason.message);
  });

  allEvents.sort((a,b) => a.date.localeCompare(b.date));
  renderAll();
  renderSidebar();

  if (errors.length) console.warn('일부 캘린더 오류:', errors.join(', '));
}

════════════════════════════════════ */
function getFiltered() {
  return allEvents.filter(ev => {
    if (activeCat !== 'all' && ev.cat !== activeCat) return false;
    if (activePlat !== '전체' && !ev.plat.includes(activePlat)) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      if (!ev.title.toLowerCase().includes(q) && !ev.classify.toLowerCase().includes(q)) return false;
    }
    if (activeTier && activeTier !== 'all') { if (!ev.tier || ev.tier.charAt(0) !== activeTier) return false; }
    return true;
  });
}

}

        <div style="padding:12px 4px 8px;font-size:13px;font-weight:700;color:var(--gray-400)">
          선택한 조건의 일정이 없습니다. 최근 일정을 보여드릴게요.
        </div>`;
      const tempDiv = document.createElement('div');
      const fakeList = document.createElement('div');
      fakeList.className = 'game-list';
      recent.forEach(ev => {
        fakeList.innerHTML += renderCard(ev);
      });
      container.appendChild(fakeList);
      return;
    }
    container.innerHTML = `<div class="empty-msg"><span class="ico">🎮</span>일정이 없습니다.</div>`;
    return;
  }

  let html = renderEventBanners(activeEvents);

  // 날짜별 그룹
  const groups = {};
  filtered.forEach(ev => {
    if (!groups[ev.date]) groups[ev.date] = [];
    groups[ev.date].push(ev);
  });

  const todayStr = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;

  for (const [date, evs] of Object.entries(groups)) {
    const d = new Date(date.replace(/\./g,'-'));
    const dow = DAYS[d.getDay()];
    const isToday = date === todayStr;
    const todayTag = isToday ? `<span class="date-today-tag">오늘</span>` : '';
    const [yyyy,mm,dd] = date.split('.');

    html += `
    <div class="date-section" data-month="${yyyy}-${mm}" data-date="${date}">
      <div class="date-header">
        <span class="date-label">${mm}월 ${dd}일 ${dow}요일</span>
        ${todayTag}
        <div class="date-line"></div>
      </div>
      <div class="game-list">
        ${evs.map(ev => renderCard(ev)).join('')}
      </div>
    </div>`;
  }

  container.innerHTML = html;
}

const eventStore = [];

  const idx = eventStore.length;

  const cls = CAT_COLOR[ev.cat] || 'release';
  const platHtml = makePlatHtml(ev.plat, 13);
  const dateLabel = ev.endDate ? `${ev.date} ~ ${ev.endDate}` : ev.date;
  const classifyBadge = ev.classify ? `<span class="badge badge-genre">${ev.classify}</span>` : '';

    ? `<img src="${ev.imageUrl}" onerror="this.style.display='none'" alt=""
           loading="lazy" decoding="async"
           style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;">`
    : '';
  const yStamp = (ev.tier && ev.tier.charAt(0) === 'S') ? `<div class="card-y-stamp">🔥</div>` : '';

  const featuredClass = ev.featured ? ' featured' : '';

  return `
  <div class="game-card${featuredClass}" onclick="openDetail(${idx})" style="cursor:pointer">
    <div class="card-thumb" style="position:relative;${getThumbGradient(ev.cat)}">
      ${imgHtml}${yStamp}${tierStamp}
    </div>
    <div class="card-body">
      <div class="card-badges">
        <span class="badge badge-${cls}">${getCatShort(ev.cat)}</span>
        ${classifyBadge}
      </div>
      <div class="card-title">${ev.title}</div>
      <div class="card-meta">

        ${ev.plat.length ? `<div class="meta-dot"></div><div class="platform-icons">${platHtml}</div>` : ''}
      </div>
    </div>
  </div>`;
}

function renderSideCal() {
  const el = document.getElementById('sideCalGrid');
  const title = document.getElementById('sideCalTitle');
  if (!el) return;
  title.textContent = `${sideCalYear}년 ${sideCalMonth}월`;

  const eventDays = new Set(
    allEvents.filter(e => {
      const [ey,em] = e.date.split('.').map(Number);
      return ey === sideCalYear && em === sideCalMonth;
    }).map(e => parseInt(e.date.split('.')[2]))
  );

  const firstDow = new Date(sideCalYear, sideCalMonth-1, 1).getDay();
  const daysInMonth = new Date(sideCalYear, sideCalMonth, 0).getDate();
  const todayD = now.getDate(), todayM = now.getMonth()+1, todayY = now.getFullYear();

  let html = DAYS.map((d,i) => `<div class="cal-dow ${i===0?'sun':i===6?'sat':''}">${d}</div>`).join('');
  for (let i = 0; i < firstDow; i++) html += `<div class="cal-day empty">·</div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const dow = (firstDow + d - 1) % 7;
    const isToday = d === todayD && sideCalMonth === todayM && sideCalYear === todayY;
    const hasEv  = eventDays.has(d);
    const cls = [
      'cal-day',
      isToday ? 'today' : '',
      hasEv ? 'has-event' : '',
      dow === 0 ? 'sun' : dow === 6 ? 'sat' : ''
    ].filter(Boolean).join(' ');
    html += `<div class="${cls}" onclick="jumpToDate('${sideCalYear}.${String(sideCalMonth).padStart(2,'0')}.${String(d).padStart(2,'0')}')">${d}</div>`;
  }
  el.innerHTML = html;
}

function sideCalNav(dir) {
  sideCalMonth += dir;
  if (sideCalMonth > 12) { sideCalMonth = 1; sideCalYear++; }
  if (sideCalMonth < 1)  { sideCalMonth = 12; sideCalYear--; }
  renderSideCal();
}

function jumpToDate(dateStr) {
  const [y,m] = dateStr.split('.').map(Number);
  if (y !== viewYear || m !== viewMonth) {
    viewYear = y; viewMonth = m;
    loadData();
  }
}

function highlightText(text, query) {
  if (!query) return text;
  var re = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

function renderSearchResults(query) {
  var body = document.getElementById('searchBody');
  var header = '';
  var q = query.trim().toLowerCase();

  if (!q) {
    body.innerHTML = '<div class="search-empty"><span class="ico">🔍</span>검색어를 입력하세요</div>';
    return;
  }

  var results = allEvents.filter(function(ev) {
    return ev.title.toLowerCase().includes(q)
      || (ev.classify && ev.classify.toLowerCase().includes(q));
  });

  if (!results.length) {
    body.innerHTML = '<div class="search-empty"><span class="ico">😢</span>"' + query + '" 검색 결과가 없습니다</div>';
    return;
  }

  var headerHtml = '<div class="search-result-header">"<strong>' + query + '</strong>" 검색 결과 — <strong>' + results.length + '건</strong></div>';

  var itemsHtml = results.map(function(ev) {
    var evIdx = eventStore.indexOf(ev);
    if (evIdx === -1) { eventStore.push(ev); evIdx = eventStore.length - 1; }

    var cls = CAT_COLOR[ev.cat] || 'release';
    var catShort = getCatShort(ev.cat);
    var dateParts = ev.date.split('.');
    var d = new Date(parseInt(dateParts[0]), parseInt(dateParts[1])-1, parseInt(dateParts[2]));
    var dowStr = DAYS_KO[d.getDay()] + '요일';
    var dateDisp = (dateParts[1]||'').replace(/^0/,'') + '.' + (dateParts[2]||'').replace(/^0/,'');
    var titleHl = highlightText(ev.title, query);
    var platHtml = makePlatHtml(ev.plat.slice(0,3), 13);
    var classifyHtml = ev.classify ? '<span class="badge badge-genre">'+ev.classify+'</span>' : '';
    var tierHtml = ev.tier ? '<span class="tier-badge tier-'+ev.tier.charAt(0)+'" style="width:20px;height:20px;font-size:10px">'+ev.tier.charAt(0)+'</span>' : '';

    return '<div class="search-item" onclick="closeSearch();openDetail('+evIdx+')">'
      + '<div class="search-item-date">'
      + '<div class="s-date-day">' + dateDisp + '</div>'
      + '<div class="s-date-dow">' + dowStr + '</div>'
      + '</div>'
      + '<div class="search-item-body">'
      + '<div class="search-item-badges">'
      + '<span class="badge badge-'+cls+'">'+catShort+'</span>'
      + classifyHtml + tierHtml
      + '</div>'
      + '<div class="search-item-title">' + titleHl + '</div>'
      + '<div class="search-item-meta">'
      + (ev.plat.length ? '<div class="platform-icons">' + platHtml + '</div>' : '')
      + '</div>'
      + '</div>'
      + '</div>';
  }).join('');

  body.innerHTML = headerHtml + itemsHtml;
}

function openDetail(evOrIdx) {
  const ev = typeof evOrIdx === 'number' ? eventStore[evOrIdx] : evOrIdx;
  const panel = document.getElementById('detailPanel');
  const overlay = document.getElementById('panelOverlay');
  const body = document.getElementById('panelBody');
  const label = document.getElementById('panelHeaderLabel');

  const cls = CAT_COLOR[ev.cat] || 'release';
  const catShort = getCatShort(ev.cat) || ev.cat;
  label.textContent = ev.cat;

  const dateLabel = ev.endDate ? `${ev.date} ~ ${ev.endDate}` : ev.date;
  const platHtml = ev.plat.length ? makePlatHtml(ev.plat, 16) : '<span style="color:var(--gray-400)">—</span>';

  // description 원본 정제
  const rawDesc = ev.raw?.description ? stripHtml(ev.raw.description) : '';
  // 키:값 형태 라인 필터링 (분류:, 추천:, 이미지: 등 제거)
  // 100자설명 키 값 추출
  // 메타 키 목록 (제거 대상)
  const META_KEYS = /^(분류|장르|genre|category|플랫폼|platform|추천|hot|best|featured|pick|이미지|image|img|thumbnail|비고|note|memo|공식사이트|official|website|홈페이지|steam|스팀|playstation|ps|xbox|xb|nintendo|ns|eshop|닌텐도|appstore|앱스토어|ios|googleplay|구글플레이|aos|android|개발사|developer|dev|퍼블리셔|publisher|pub|등급|티어|tier|grade|rank|유튜브|youtube|100자설명|100자소개|소개|출시일|링크|steam|공식)$/;

  let desc100 = '';
  const descLines = [];

  rawDesc.split('\n').forEach(line => {
    const bare = line.replace(/^[\s•\-\*·▪▸►○●◆◇]+/, '').trim();
    if (!bare) return;
    // 순수 URL 라인 제거
    if (/^https?:\/\/\S+$/.test(bare)) return;
    // 키:값 분리
    const km = bare.match(/^([^:：]{1,15})[：:]\s*(.*)$/);
    if (km) {
      const key = km[1].trim().toLowerCase().replace(/\s/g, '');
      const val = km[2].trim();
      // 100자설명 키 추출
      if (/^(100자설명|100자소개|소개)$/.test(key) && val) { desc100 = val; return; }
      // 메타 키 제거
      if (META_KEYS.test(key)) return;
    }
    // 남은 라인 = 일반 설명 텍스트
    descLines.push(bare);
  });

  const descText = desc100 || descLines.join('\n').trim();

  const heroStyle = getThumbGradient(ev.cat);
  const imgTag = ev.imageUrl
    ? `<img src="${ev.imageUrl}" onerror="this.style.display='none'" alt="" loading="lazy" decoding="async" style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;">`
    : '';
  const yBadge = (ev.tier && ev.tier.charAt(0) === 'S') ? `<span class="panel-y-badge">🔥 GAMEY PICK</span>` : '';
  // S등급은 GAMEY PICK 배지로 대체, 나머지만 등급 배지 표시
  const tierBadge = (ev.tier && ev.tier.charAt(0) !== 'S') ? `<span class="tier-badge tier-${ev.tier.charAt(0)} panel-tier-badge">${ev.tier.charAt(0)} 등급</span>` : '';
  const classifyBadge = ev.classify ? `<span class="badge badge-genre">${ev.classify}</span>` : '';

  // Google Calendar 링크
  const gcalUrl = ev.raw?.htmlLink || '';

  function detectSiteInfo(url) {

      if (host.includes('store.steampowered') || host.includes('steam')) return {label:'Steam', cls:'steam', favicon:'https://store.steampowered.com/favicon.ico'};

      const domain = host.replace('www.','').split('.')[0];

   GOOGLE OAUTH

const GOOGLE_CLIENT_ID = '108753841480-2ms49d8bml81mt8ejqiul1t8hgaqruqc.apps.googleusercontent.com'; // ← Google Cloud Console에서 발급한 OAuth Client ID 입력
let currentUser = null;

function initGoogleAuth() {
  // Google Identity Services (GSI) 로드
  const script = document.createElement('script');
  script.src = 'https://accounts.google.com/gsi/client';
  script.onload = () => {
    if (!GOOGLE_CLIENT_ID) return; // Client ID 없으면 스킵
    google.accounts.id.initialize({
      client_id: GOOGLE_CLIENT_ID,
      callback: onGoogleSignIn,
      auto_select: true,
    });
  };
  document.head.appendChild(script);

  // 저장된 사용자 복원
  try {
    const saved = JSON.parse(localStorage.getItem('gamey_user') || 'null');
    if (saved) {
      // Mojibake 감지 (Ã Â ì í ë 같은 Latin-1 해석된 UTF-8 흔적)
      const mojibakePattern = /[ÃÂìíîïðñòóôõöøùúûü]{2,}/;
      if (mojibakePattern.test(saved.name || '') || mojibakePattern.test(saved.googleName || '')) {
        console.warn('[auth] 깨진 이름 감지 → 저장된 로그인 정보 초기화');
        localStorage.removeItem('gamey_user');
        localStorage.removeItem('gamey_display_name');
      } else {
        currentUser = saved;
        updateUserUI();
      }
    }
  } catch(e) {}
}

function onGoogleSignIn(response) {
  // JWT decode (base64 + UTF-8)
  const b64 = response.credential.split('.')[1];
  let payload;
  try {
    // base64url → base64 → UTF-8 바이트 → 문자열
    const b64std = b64.replace(/-/g, '+').replace(/_/g, '/');
    const padded = b64std + '==='.slice((b64std.length + 3) % 4);
    const bin = atob(padded);
    const bytes = Uint8Array.from(bin, c => c.charCodeAt(0));
    const json = new TextDecoder('utf-8').decode(bytes);
    payload = JSON.parse(json);
  } catch(e) {
    console.error('[auth] JWT 디코드 실패:', e);
    return;
  }
  const savedName = localStorage.getItem('gamey_display_name');
  currentUser = {
    name: savedName || payload.name,
    googleName: payload.name,
    email: payload.email,
    avatar: payload.picture,
    sub: payload.sub,
  };
  localStorage.setItem('gamey_user', JSON.stringify(currentUser));
  updateUserUI();
}

/* ════ 댓글 시스템 ════ */
function getCommentKey(key){ return 'gamey_cmt_' + key; }

function loadComments(key){
  try { return JSON.parse(localStorage.getItem(getCommentKey(key)) || '[]'); }
  catch(e){ return []; }
}

function renderComments(key){
  var list = document.getElementById('commentList');
  var cnt  = document.getElementById('commentCount');
  if (!list) return;
  var comments = loadComments(key);
  if (cnt) cnt.textContent = comments.length;
  if (!comments.length) {
    list.innerHTML = '<div class="comment-empty">첫 번째 댓글을 남겨보세요!</div>';
    return;
  }
  list.innerHTML = comments.map(function(c){
    return '<div class="comment-item">'
      + '<div class="comment-item-header">'
      + '<div class="comment-avatar">' + c.name.charAt(0).toUpperCase() + '</div>'
      + '<span class="comment-author">' + c.name + '</span>'

      + '<span class="comment-date">' + c.date + '</span>'

function submitAddEvent() {
  const title = document.getElementById('addTitle').value.trim();
  const cat   = document.getElementById('addCat').value;
  const classify = document.getElementById('addClassify').value.trim();
  const dateStart = document.getElementById('addDateStart').value;

  const desc  = document.getElementById('addDesc').value.trim();
  const image = document.getElementById('addImage').value.trim();
  const yt    = document.getElementById('addYoutube').value.trim();

  if (!title || !dateStart) {
    alert('게임 이름과 시작일은 필수입니다.');
    return;
  }

  const plats = [...document.querySelectorAll('.plat-check.selected')].map(p => p.dataset.plat);

  // description 조합
  const descParts = [];
  if (classify) descParts.push('분류:' + classify);
  if (plats.length) descParts.push('플랫폼:' + plats.join('/'));
  if (image) descParts.push('이미지:' + image);
  if (yt) descParts.push(yt);
  if (desc) descParts.push(desc);
  const author = currentUser?.name || '';
  if (author) descParts.push('작성자:' + author);

  // 제목 조합 (기존 형식)
  const fullTitle = plats.length ? `${title}[${plats.join('/')}]` : title;

  // Google Calendar 이벤트 추가 URL
  const calId = CALENDAR_IDS[cat] || '';
  const startFmt = dateStart.replace(/-/g,'');
  const endDate  = dateEnd ? new Date(dateEnd) : new Date(dateStart);
  if (!dateEnd) endDate.setDate(endDate.getDate() + 1);
  const endFmt = endDate.toISOString().slice(0,10).replace(/-/g,'');

  const gcalUrl = 'https://calendar.google.com/calendar/r/eventedit?' + new URLSearchParams({
    text: fullTitle,
    dates: startFmt + '/' + endFmt,
    details: descParts.join('\n'),
    add: calId,
  });

  window.open(gcalUrl, '_blank');
  closeAddModal();
}

/* ════════════════════════════════════
   MONTH NAVIGATOR
   ════════════════════════════════════ */
const MNAV_YEAR_MIN = 1970;
const MNAV_YEAR_MAX = 2050;
let mnavSelectedYear = new Date().getFullYear();
let mnavSelectedMonth = new Date().getMonth() + 1; // 1-12

function mnavInit() {
  // URL 쿼리에서 초기값 읽기
  const qs = new URLSearchParams(location.search);
  const qy = parseInt(qs.get('y'), 10);
  const qm = parseInt(qs.get('m'), 10);
  if (qy >= MNAV_YEAR_MIN && qy <= MNAV_YEAR_MAX) mnavSelectedYear = qy;
  if (qm >= 1 && qm <= 12) mnavSelectedMonth = qm;

  // 연도 <select> 채우기 (최신이 위)
  const sel = document.getElementById('mnavYearSelect');
  let opts = '';
  for (let y = MNAV_YEAR_MAX; y >= MNAV_YEAR_MIN; y--) {
    opts += `<option value="${y}"${y === mnavSelectedYear ? ' selected' : ''}>${y}년</option>`;
  }
  if (sel) sel.innerHTML = opts;

  mnavRenderMonthGrid();
  mnavUpdateBtnLabel();

  // Fallback: 버튼에 직접 이벤트 리스너 바인딩 (onclick 인라인이 혹시 무력화된 경우 대비)
  const btn = document.getElementById('mnavBtn');
  if (btn) {
    btn.addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      toggleMnav(e);
    });
    console.log('[mnav] 버튼 이벤트 리스너 바인딩 완료');
  } else {
    console.warn('[mnav] mnavBtn 요소를 찾을 수 없음');
  }

  // 바깥 클릭 닫기
  document.addEventListener('click', (e) => {
    const pop = document.getElementById('mnavPopup');
    const btn2 = document.getElementById('mnavBtn');
    if (!pop || !btn2) return;
    if (pop.classList.contains('open') && !pop.contains(e.target) && !btn2.contains(e.target)) {
      mnavClose();
    }
  });

  // ESC 닫기
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') mnavClose();
  });

  // 쿼리 파라미터로 초기 로드된 경우 해당 월로 스크롤
  if (qy || qm) {
    setTimeout(() => mnavScrollToMonth(mnavSelectedYear, mnavSelectedMonth), 1500);
  }
}

function mnavRenderMonthGrid() {
  const grid = document.getElementById('mnavMonthGrid');
  const now = new Date();
  const curY = now.getFullYear();
  const curM = now.getMonth() + 1;
  let html = '';
  for (let m = 1; m <= 12; m++) {
    const isSelected = m === mnavSelectedMonth;
    const isCurrent = mnavSelectedYear === curY && m === curM;
    const cls = ['mnav-month-cell'];
    if (isSelected) cls.push('selected');
    if (isCurrent) cls.push('current');
    html += `<button type="button" class="${cls.join(' ')}" onclick="mnavSelectMonth(${m})">${m}월</button>`;
  }
  grid.innerHTML = html;
}

function mnavUpdateBtnLabel() {
  const lbl = document.getElementById('mnavBtnLabel');
  if (lbl) lbl.textContent = `${mnavSelectedYear}년 ${mnavSelectedMonth}월`;
}

function toggleMnav(ev) {
  if (ev) { ev.preventDefault(); ev.stopPropagation(); }
  const pop = document.getElementById('mnavPopup');
  const btn = document.getElementById('mnavBtn');
  if (!pop || !btn) { console.warn('[mnav] 요소 없음'); return; }
  const isOpen = pop.classList.contains('open');
  console.log('[mnav] 토글 전 상태:', isOpen ? '열림' : '닫힘');
  if (isOpen) {
    mnavClose();
  } else {
    // 다른 드롭다운들 닫기
    document.querySelectorAll('.user-menu.open').forEach(el => el.classList.remove('open'));
    mnavPositionPopup();
    pop.classList.add('open');
    btn.classList.add('active');
    btn.setAttribute('aria-expanded', 'true');
    console.log('[mnav] 팝업 열림, 위치:', pop.style.top, pop.style.left);
  }
}

function mnavPositionPopup() {
  const pop = document.getElementById('mnavPopup');
  const btn = document.getElementById('mnavBtn');
  if (!pop || !btn) return;
  const rect = btn.getBoundingClientRect();
  // 임시로 display:block으로 해야 width 측정 가능
  const prevDisplay = pop.style.display;
  pop.style.visibility = 'hidden';
  pop.style.display = 'block';
  const popW = pop.offsetWidth;
  const popH = pop.offsetHeight;
  pop.style.display = prevDisplay;
  pop.style.visibility = '';

  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const GAP = 8;
  const MARGIN = 12;

  // 기본: 버튼 아래 + 우측 정렬
  let top = rect.bottom + GAP;
  let left = rect.right - popW;

  // 화면 왼쪽 넘침 방지
  if (left < MARGIN) left = MARGIN;
  // 화면 오른쪽 넘침 방지
  if (left + popW > vw - MARGIN) left = vw - popW - MARGIN;
  // 화면 아래 넘침: 위로 띄우기
  if (top + popH > vh - MARGIN) {
    const above = rect.top - GAP - popH;
    if (above >= MARGIN) top = above;
    else top = Math.max(MARGIN, vh - popH - MARGIN);
  }

  pop.style.top = top + 'px';
  pop.style.left = left + 'px';
}

// 스크롤/리사이즈 시 열려있으면 위치 재계산
window.addEventListener('scroll', () => {
  const pop = document.getElementById('mnavPopup');
  if (pop?.classList.contains('open')) mnavPositionPopup();
}, { passive: true });
window.addEventListener('resize', () => {
  const pop = document.getElementById('mnavPopup');
  if (pop?.classList.contains('open')) mnavPositionPopup();
});

function mnavClose() {
  const pop = document.getElementById('mnavPopup');
  const btn = document.getElementById('mnavBtn');
  if (pop) pop.classList.remove('open');
  if (btn) {
    btn.classList.remove('active');
    btn.setAttribute('aria-expanded', 'false');
  }
}

function mnavGo() {
  mnavUpdateBtnLabel();
  // URL 반영 (history 미변경 방식: replaceState)
  try {
    const url = new URL(location.href);
    url.searchParams.set('y', String(mnavSelectedYear));
    url.searchParams.set('m', String(mnavSelectedMonth));
    history.replaceState(null, '', url.toString());
  } catch(e) { /* noop */ }
  mnavClose();
  mnavScrollToMonth(mnavSelectedYear, mnavSelectedMonth);
}

function mnavScrollToMonth(year, month) {
  const ym = `${year}-${String(month).padStart(2,'0')}`;
  // 해당 월의 첫번째 섹션 찾기
  const sections = document.querySelectorAll('.date-section[data-month]');
  let target = null;
  for (const s of sections) {
    if (s.dataset.month === ym) { target = s; break; }
  }
  if (target) {
    // 필터바 높이만큼 오프셋
    const gnb = document.querySelector('.gnb');
    const fsk = document.querySelector('.filter-sticky');
    const off = (gnb?.offsetHeight || 0) + (fsk?.offsetHeight || 0) + 12;
    const top = target.getBoundingClientRect().top + window.pageYOffset - off;
    window.scrollTo({ top, behavior: 'smooth' });
  } else {
    // 해당 월 데이터 없으면 가장 가까운 섹션 찾기
    let closest = null, minDiff = Infinity;
    for (const s of sections) {
      if (!s.dataset.date) continue;
      const [sy, sm] = s.dataset.month.split('-').map(Number);
      const diff = Math.abs((sy - year) * 12 + (sm - month));
      if (diff < minDiff) { minDiff = diff; closest = s; }
    }
    if (closest) {
      const gnb = document.querySelector('.gnb');
      const fsk = document.querySelector('.filter-sticky');
      const off = (gnb?.offsetHeight || 0) + (fsk?.offsetHeight || 0) + 12;
      const top = closest.getBoundingClientRect().top + window.pageYOffset - off;
      window.scrollTo({ top, behavior: 'smooth' });
      // 안내 토스트 (간단히 console + 알림 생략)
      console.info(`${year}년 ${month}월 데이터 없음 — 가장 가까운 ${closest.dataset.date}로 이동`);
    } else {
      alert(`${year}년 ${month}월 데이터가 없습니다.`);
    }
  }
}

// 초기화
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', mnavInit);
} else {
  mnavInit();
}
</script>
